<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finding Flight</title> 
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="styles.css">
    <!--Icons-->
    <script src="https://kit.fontawesome.com/47b43f2c15.js" crossorigin="anonymous"></script>
    <!--Font-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@200..700&display=swap" rel="stylesheet">
</head>
<body>

    <!--Navbar--> 
    <div id="navbarWrapper"></div>
    <section class="section-spotlight">
        <div class="row row-headerbg">
            <div class="col-md-12">
            </div>
        </div>
    </section>

    <!--Contact Us-->
    <section class="section-basic">

        <div class="container-fluid wrapper-contact">

            <div class="row row-contact">

                <div class="col-md-4 col-contact">
                    <!--Bootstrap Embed Classes-->
                    <div class="embed-responsive contactMap">
                        <iframe class="embed-responsive-item contactMap" src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3344.164109103586!2d-97.23530378849418!3d33.05214607343951!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x864dcfd79d0a18e9%3A0x241b53933da27e2a!2sAero%20Valley%20Airport%20(52F)!5e0!3m2!1sen!2sus!4v1729966921956!5m2!1sen!2sus">
                        </iframe>
                    </div>
                    <div class="wrapper-contactInfo">
                        <p class="contactInfo">
                            <i class="fa-solid fa-envelope contactIcon"></i>
                            info@findingflightaviation.com
                        </p>
                        <p class="contactInfo">
                            <i class="fa-solid fa-phone contactIcon"></i>
                            940-735-9114
                        </p>
                    </div>
                </div>

                <div class="col-md-8 col-contact">
                    <h3 class="contactHeader">GET IN TOUCH</h3>

                    <!--Contact Form-->
                    <form action="https:formsubmit.co/info@findingflightaviation.com" method="POST">

                        <!--First and Last Name-->
                        <div class="row">
                            <div class="col">
                                <label for="firstName">
                                    First Name
                                </label>
                                <input type="text" class="form-control" id="firstName" placeholder="First name">
                            </div>
                            <div class="col">
                                <label for="lastName">
                                    Last Name
                                </label>
                                <input type="text" class="form-control" id="lastName" placeholder="Last name">
                            </div>
                        </div>

                        <!--Email & Phone-->
                        <div class="form-group">
                            <label for="emailInput">
                                Email Address
                            </label>
                            <input type="email" class="form-control" id="emailInput" placeholder="Email address">
                        </div>
                        <div class="form-group">
                            <label for="phoneInput">
                                Phone Number
                            </label>
                            <input type="number" class="form-control" id="phoneInput" placeholder="Phone number">
                        </div>

                        <!--Message-->
                        <div class="form-group">
                            <label for="textInput">
                                Message
                            </label>
                            <textarea class="form-control" id="textInput" placeholder="Message" rows="3"></textarea>
                        </div>

                    </form>

                    <button type="submit" class="btn basicButton contactButton">SUBMIT</button>
                </div>

            </div>

        </div>

    </section>

    <!--Footer-->
    <div id="footerWrapper"></div>

</body>
</html>
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
<script src="/main.js"></script>
